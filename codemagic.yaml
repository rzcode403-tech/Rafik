workflows:
  android-release:
    name: Rafik Android Release
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      android_signing:
        - rafik_keystore          # ← اسم الـ keystore في Codemagic

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK (Release)
        script: |
          flutter build apk --release \
            --build-name=2.0.0 \
            --build-number=$BUILD_NUMBER

      - name: Build AAB (Google Play)
        script: |
          flutter build appbundle --release \
            --build-name=2.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - rzcode403@gmail.com        # ← بريدك الإلكتروني
        notify:
          success: true
          failure: true
